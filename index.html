<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BalatroLike — パズル × ローグライク</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111;
      --border: #252525;
      --text: #ccc;
      --dim: #555;
      --accent: #00ff88;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px;
    }

    h1 {
      font-size: 42px;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--dim);
      font-size: 13px;
      margin-bottom: 48px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 860px;
    }

    .game-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 28px 24px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.12s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .game-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .game-card .card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    .game-card .card-desc {
      font-size: 12px;
      color: var(--dim);
      line-height: 1.6;
    }

    .game-card .card-tag {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--dim);
      border: 1px solid var(--border);
      padding: 3px 8px;
      align-self: flex-start;
    }

    footer {
      margin-top: 64px;
      font-size: 11px;
      color: var(--dim);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>BALATRO<span>LIKE</span></h1>
  <p class="subtitle">パズル × ローグライク ブラウザゲーム集</p>

  <div class="game-grid" id="game-grid"></div>

  <footer>
    <a href="https://github.com/" id="repo-link">GitHub</a>
  </footer>

  <script>
    // ============================================================
    //  Game registry — add new entries here to extend the portal
    // ============================================================
    const GAMES = [
      {
        id: '2048',
        title: '2048',
        desc: '2048のパズル性 × バラトロの倍率インフレ。盤面が詰まる前にスコアを稼げ。',
        path: '2048/',
        tags: ['2048', 'prototype'],
      },
      {
        id: 'reversi',
        title: 'REVERSI',
        desc: 'リバーシの石返し × バラトロの倍率インフレ。黒石が増えるほど寿命が縮まるジレンマ。',
        path: 'reversi/',
        tags: ['reversi', 'prototype'],
      },
      {
        id: 'sudoku',
        title: 'SUDOKATRO',
        desc: '数独の配置ルール × 手札マネジメント × ライン消去。列を揃えて倍率を爆発させろ。',
        path: 'sudoku/',
        tags: ['sudoku', 'prototype'],
      },
    ];

    // ============================================================
    //  Render
    // ============================================================
    const grid = document.getElementById('game-grid');

    GAMES.forEach(game => {
      const card = document.createElement('a');
      card.href = game.path;
      card.className = 'game-card';
      card.innerHTML = `
        <div class="card-title">${game.title}</div>
        <div class="card-desc">${game.desc}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${game.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
